<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Off-Catalog Admin · Dialed By H</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/x-icon" href="/favicon-v2.ico?v=3" />

    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/dist/styles.css">

    <style>
        body { text-transform: none; opacity: 1 !important; transition: none !important; }
        .admin-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(20px) saturate(1.4);
            -webkit-backdrop-filter: blur(20px) saturate(1.4);
        }
        .status-pill {
            display: inline-block;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 9px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 999px;
        }
        .status-draft     { background: rgba(255,255,255,0.06); color: #888; }
        .status-published { background: rgba(74,222,128,0.12); color: #4ade80; }
        .status-archived  { background: rgba(255,255,255,0.04); color: #555; }
    </style>
</head>
<body class="min-h-screen bg-charcoal text-ivory font-inter">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- LOGIN GATE -->
    <section id="login-gate" class="min-h-screen flex items-center justify-center px-6">
        <div class="admin-card rounded-2xl p-8 sm:p-10 w-full max-w-md">
            <div class="flex items-center gap-3 mb-6">
                <img src="/images/logo.png" alt="Dialed By H" class="h-7 w-auto">
            </div>
            <p class="text-[10px] tracking-[0.3em] uppercase text-muted font-space mb-2">Off-Catalog</p>
            <h1 class="font-space font-bold text-3xl mb-6 tracking-tight">Admin Login</h1>
            <form id="login-form" class="space-y-4">
                <input id="password-input" type="password" autocomplete="current-password" placeholder="Admin password"
                    class="w-full bg-transparent border-b border-ivory/30 py-3 px-2 text-ivory placeholder-muted/60 focus:border-ivory outline-none font-inter">
                <p id="login-error" class="text-xs text-red-400 hidden">Wrong password.</p>
                <button type="submit"
                    class="w-full bg-ivory text-charcoal py-3 font-space font-bold text-xs uppercase tracking-[0.25em] hover:bg-white transition-colors">
                    Sign In
                </button>
            </form>
        </div>
    </section>

    <!-- ADMIN DASHBOARD (hidden until authed) -->
    <section id="dashboard" class="hidden">
        <nav class="px-6 sm:px-10 md:px-16 py-5 sm:py-6 flex justify-between items-center border-b border-ivory/5">
            <a href="/" class="flex items-center gap-3">
                <img src="/images/logo.png" alt="Dialed By H" class="h-7 sm:h-8 w-auto">
            </a>
            <div class="flex items-center gap-5 text-xs font-space font-medium uppercase tracking-widest">
                <a href="/journal/" class="hover:text-muted transition-colors">View Site</a>
                <button id="logout-btn" class="text-muted hover:text-ivory transition-colors">Sign Out</button>
            </div>
        </nav>

        <div class="px-6 sm:px-10 md:px-16 py-10 sm:py-14 max-w-6xl mx-auto">
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-end gap-4 mb-10">
                <div>
                    <p class="text-[10px] tracking-[0.3em] uppercase text-muted font-space mb-2">Off-Catalog</p>
                    <h1 class="font-space font-bold text-3xl sm:text-4xl tracking-tight">Articles</h1>
                </div>
                <a href="/admin/journal/edit.html"
                    class="inline-flex items-center justify-center bg-ivory text-charcoal px-6 py-3 font-space font-bold text-xs uppercase tracking-[0.25em] hover:bg-white transition-colors">
                    New Article
                </a>
            </div>

            <div id="article-list" class="space-y-3">
                <div class="text-muted text-sm">Loading…</div>
            </div>
        </div>
    </section>

    <script src="/scripts/admin-auth.js"></script>
    <script>
        const loginGate    = document.getElementById("login-gate");
        const dashboard    = document.getElementById("dashboard");
        const loginForm    = document.getElementById("login-form");
        const passwordInput= document.getElementById("password-input");
        const loginError   = document.getElementById("login-error");
        const logoutBtn    = document.getElementById("logout-btn");
        const articleList  = document.getElementById("article-list");

        function showDashboard() {
            loginGate.classList.add("hidden");
            dashboard.classList.remove("hidden");
            loadArticles();
        }

        function showLogin() {
            dashboard.classList.add("hidden");
            loginGate.classList.remove("hidden");
            passwordInput.value = "";
            passwordInput.focus();
        }

        function escHtml(s) {
            return String(s == null ? "" : s)
                .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
        }

        function formatDate(iso) {
            if (!iso) return "";
            try { return new Date(iso).toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" }); }
            catch { return ""; }
        }

        async function loadArticles() {
            articleList.innerHTML = `<div class="text-muted text-sm">Loading…</div>`;
            try {
                const { articles } = await window.dialedAdmin.adminFetch("list-all");
                if (!articles || articles.length === 0) {
                    articleList.innerHTML = `
                        <div class="admin-card rounded-2xl p-10 text-center">
                            <p class="text-muted text-sm mb-4">No articles yet.</p>
                            <a href="/admin/journal/edit.html" class="text-ivory font-space font-bold text-xs tracking-[0.25em] uppercase hover:underline">Write your first piece →</a>
                        </div>`;
                    return;
                }
                articleList.innerHTML = articles.map(a => `
                    <a href="/admin/journal/edit.html?id=${encodeURIComponent(a.id)}"
                       class="admin-card rounded-xl p-5 sm:p-6 flex flex-col sm:flex-row sm:items-center gap-4 hover:border-ivory/20 transition-colors group">
                        <div class="flex-1 min-w-0">
                            <div class="flex flex-wrap items-center gap-3 mb-2">
                                <span class="status-pill status-${escHtml(a.status)}">${escHtml(a.status)}</span>
                                ${a.category ? `<span class="text-[10px] uppercase tracking-[0.2em] text-muted font-space">${escHtml(a.category)}</span>` : ""}
                                <span class="text-[10px] uppercase tracking-[0.2em] text-muted font-space">${formatDate(a.published_at || a.updated_at)}</span>
                            </div>
                            <h3 class="font-space font-bold text-lg sm:text-xl tracking-tight truncate group-hover:text-white">${escHtml(a.title)}</h3>
                            ${a.subtitle ? `<p class="text-muted text-sm mt-1 truncate">${escHtml(a.subtitle)}</p>` : ""}
                        </div>
                        <div class="flex items-center gap-3 text-[10px] uppercase tracking-[0.2em] text-muted font-space whitespace-nowrap">
                            ${typeof a.view_count === "number" ? `<span>${a.view_count} views</span>` : ""}
                            <span class="text-ivory/40 group-hover:text-ivory transition-colors">Edit →</span>
                        </div>
                    </a>
                `).join("");
            } catch (e) {
                if (e.message === "Unauthorized") return showLogin();
                articleList.innerHTML = `<div class="text-red-400 text-sm">Error: ${escHtml(e.message)}</div>`;
            }
        }

        loginForm.addEventListener("submit", async (ev) => {
            ev.preventDefault();
            loginError.classList.add("hidden");
            const ok = await window.dialedAdmin.tryLogin(passwordInput.value.trim());
            if (ok) showDashboard();
            else loginError.classList.remove("hidden");
        });

        logoutBtn.addEventListener("click", () => {
            window.dialedAdmin.clearToken();
            showLogin();
        });

        // Boot
        if (window.dialedAdmin.isAuthed()) {
            // Verify token still works by calling list-all
            window.dialedAdmin.adminFetch("list-all").then(showDashboard).catch(() => {
                window.dialedAdmin.clearToken();
                showLogin();
            });
        } else {
            showLogin();
        }
    </script>
</body>
</html>
