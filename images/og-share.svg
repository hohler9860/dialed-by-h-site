<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="orb1" cx="15%" cy="25%" r="40%">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="85%" cy="75%" r="35%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0f0f0" stop-opacity="0"/>
      <stop offset="20%" stop-color="#f0f0f0" stop-opacity="0.15"/>
      <stop offset="80%" stop-color="#f0f0f0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f0f0f0" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Ambient orbs -->
  <rect width="1200" height="630" fill="url(#orb1)"/>
  <rect width="1200" height="630" fill="url(#orb2)"/>

  <!-- Subtle border -->
  <rect x="40" y="40" width="1120" height="550" rx="16" fill="none" stroke="#f0f0f0" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Top line -->
  <rect x="0" y="195" width="1200" height="1" fill="url(#line-fade)"/>

  <!-- Bottom line -->
  <rect x="0" y="435" width="1200" height="1" fill="url(#line-fade)"/>

  <!-- Tagline above -->
  <text x="600" y="170" text-anchor="middle" fill="#888888" font-family="'Space Grotesk', 'SF Pro Display', sans-serif" font-size="13" font-weight="700" letter-spacing="6">LUXURY WATCH CONCIERGE</text>

  <!-- Main title -->
  <text x="600" y="295" text-anchor="middle" fill="#f0f0f0" font-family="'Space Grotesk', 'SF Pro Display', sans-serif" font-size="72" font-weight="700" letter-spacing="-1">DIALED BY H</text>

  <!-- Subtitle -->
  <text x="600" y="355" text-anchor="middle" fill="#888888" font-family="'Inter', 'SF Pro Text', sans-serif" font-size="18" font-weight="400" letter-spacing="4">SOURCE  ·  AUTHENTICATE  ·  DELIVER</text>

  <!-- Bottom tagline -->
  <text x="600" y="480" text-anchor="middle" fill="#f0f0f0" font-family="'Inter', 'SF Pro Text', sans-serif" font-size="14" font-weight="400" letter-spacing="2" opacity="0.4">DIALEDBYHENRY.COM</text>

  <!-- Brands strip -->
  <text x="600" y="540" text-anchor="middle" fill="#888888" font-family="'Space Grotesk', 'SF Pro Display', sans-serif" font-size="10" font-weight="700" letter-spacing="4" opacity="0.35">ROLEX  ·  PATEK PHILIPPE  ·  AUDEMARS PIGUET  ·  RICHARD MILLE  ·  F.P. JOURNE</text>
</svg>
